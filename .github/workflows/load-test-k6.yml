name: Load Test-K6

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --include=optional

      - name: Build Application
        run: npm run build

      - name: Start Application
        run: |
          npm start &
        env:
          DISABLE_RATE_LIMIT: "true"
          PORT: 3000

      - name: Wait For Application
        run: |
          echo "Waiting for localhost:3000 to become healthy..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Application is healthy!"
              break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Baseline Test
        run: k6 run --summary-export=reports/baseline-summary.json performance/mentora-load.js

      - name: Run API Test
        run: k6 run --summary-export=reports/api-summary.json performance/mentora-api-load.js

      - name: Generate Results
        run: node performance/generate-report.js

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-reports
          path: |
            reports/
            performance/
