name: Mentora QA & Security CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java (required for Firebase Firestore Emulator)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci --legacy-peer-deps --include=optional

    - name: TypeScript Linting
      run: npm run lint

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Run Security & API Tests
      run: firebase emulators:exec --only firestore "npm test"
      env:
        NODE_ENV: test
        DISABLE_HMR: true

    - name: Build Production Bundle
      run: npm run build
      env:
        NODE_ENV: production

    - name: Install Playwright Browsers & OS Dependencies
      run: npx playwright install chromium --with-deps

    - name: Start Applications & Run E2E Tests
      run: |
        # Start Firestore Emulator in the background
        npx firebase emulators:start --only firestore &
        
        # Start production backend Express app in the background
        NODE_ENV=production npm start &
        
        # Wait for port 3000 to be available
        echo "Waiting for server to start on port 3000..."
        for i in {1..30}; do
          if curl -s http://localhost:3000 > /dev/null; then
            echo "Server is up and running!"
            break
          fi
          sleep 1
        done
        
        # Run Playwright E2E tests under Xvfb (since headless: false is configured)
        xvfb-run npm run test:e2e
      env:
        NODE_ENV: test
        PORT: 3000
        FIRESTORE_EMULATOR_HOST: "127.0.0.1:8085"

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-reports-node-${{ matrix.node-version }}
        path: |
          reports/
          E2E_Test_Report_Mentora.xlsx
          QA_Demo_Report.md