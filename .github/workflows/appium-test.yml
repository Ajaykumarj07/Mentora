name: Appium Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  appium-readiness-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps --include=optional

      - name: Install Appium Globally
        run: npm install -g appium

      - name: Install UiAutomator2 Driver
        run: appium driver install uiautomator2

      - name: Verify Appium Installation
        run: appium -v

      - name: Verify Driver Installation
        run: appium driver list

      - name: Generate Appium Readiness Report
        run: node tests/appium-setup-check.js

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appium-readiness-report
          path: reports/appium-readiness.md
